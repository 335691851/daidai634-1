<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini HCM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <aside class="shell-nav">
      <div class="brand">
        <span class="brand-mark">H</span>
        <div>
          <strong>Mini HCM</strong>
          <span>Core HR</span>
        </div>
      </div>
      <button class="nav-item active" data-view="people">人员主数据</button>
      <button class="nav-item" data-view="performance">绩效考评</button>
    </aside>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">企业人力核心系统</p>
          <h1 id="viewTitle">人员主数据</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="refreshBtn" title="刷新">↻</button>
          <button class="primary-button" id="addEmployeeBtn">新增员工</button>
        </div>
      </header>

      <section class="metrics" id="metrics"></section>

      <section class="view active" id="peopleView">
        <div class="toolbar">
          <label class="search-box">
            <span>⌕</span>
            <input id="employeeSearch" type="search" placeholder="搜索姓名、工号、岗位、邮箱" />
          </label>
          <select id="departmentFilter">
            <option value="">全部部门</option>
          </select>
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option>在职</option>
            <option>试用期</option>
            <option>离职</option>
          </select>
        </div>

        <div class="workspace-grid">
          <section class="panel table-panel">
            <div class="panel-title">
              <h2>员工档案</h2>
              <span id="employeeCount">0 人</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>工号</th>
                    <th>姓名</th>
                    <th>部门</th>
                    <th>岗位</th>
                    <th>状态</th>
                    <th>绩效均分</th>
                  </tr>
                </thead>
                <tbody id="employeeRows"></tbody>
              </table>
            </div>
          </section>

          <section class="panel detail-panel">
            <div class="panel-title">
              <h2>员工信息</h2>
              <button class="ghost-button" id="markLeftBtn">标记离职</button>
            </div>
            <form id="employeeForm" class="form-grid">
              <input type="hidden" name="id" />
              <label>工号<input name="employee_no" required /></label>
              <label>姓名<input name="name" required /></label>
              <label>部门<input name="department" required /></label>
              <label>岗位<input name="position" required /></label>
              <label>直属上级<input name="manager" /></label>
              <label>状态
                <select name="status">
                  <option>在职</option>
                  <option>试用期</option>
                  <option>离职</option>
                </select>
              </label>
              <label>入职日期<input name="hire_date" type="date" /></label>
              <label>工作地点<input name="location" /></label>
              <label>用工类型
                <select name="employment_type">
                  <option>全职</option>
                  <option>兼职</option>
                  <option>实习</option>
                  <option>外包</option>
                </select>
              </label>
              <label>邮箱<input name="email" type="email" /></label>
              <label>手机<input name="phone" /></label>
              <div class="form-actions">
                <button type="button" class="ghost-button" id="clearEmployeeBtn">清空</button>
                <button type="submit" class="primary-button">保存档案</button>
              </div>
            </form>
          </section>
        </div>
      </section>

      <section class="view" id="performanceView">
        <div class="toolbar">
          <select id="cycleFilter"></select>
          <button class="primary-button" id="openCycleBtn">新增周期</button>
        </div>

        <div class="workspace-grid performance-grid">
          <section class="panel table-panel">
            <div class="panel-title">
              <h2>考评记录</h2>
              <span id="reviewCount">0 条</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>员工</th>
                    <th>部门</th>
                    <th>周期</th>
                    <th>总分</th>
                    <th>等级</th>
                    <th>状态</th>
                  </tr>
                </thead>
                <tbody id="reviewRows"></tbody>
              </table>
            </div>
          </section>

          <section class="panel detail-panel">
            <div class="panel-title">
              <h2>绩效考评</h2>
              <span id="scorePreview">3.00 达标</span>
            </div>
            <form id="reviewForm" class="form-grid">
              <input type="hidden" name="id" />
              <label>员工<select name="employee_id" required></select></label>
              <label>周期<select name="cycle_id" required></select></label>
              <label>考评人<input name="reviewer" required /></label>
              <label>状态
                <select name="status">
                  <option>草稿</option>
                  <option>已提交</option>
                  <option>已校准</option>
                  <option>已归档</option>
                </select>
              </label>
              <label>目标达成<input name="goals_score" type="number" min="1" max="5" step="0.1" value="3" /></label>
              <label>能力表现<input name="competency_score" type="number" min="1" max="5" step="0.1" value="3" /></label>
              <label>价值观<input name="values_score" type="number" min="1" max="5" step="0.1" value="3" /></label>
              <label class="wide">评语<textarea name="comments" rows="4"></textarea></label>
              <div class="form-actions">
                <button type="button" class="ghost-button" id="clearReviewBtn">清空</button>
                <button type="submit" class="primary-button">保存考评</button>
              </div>
            </form>
          </section>
        </div>
      </section>
    </main>

    <dialog id="cycleDialog">
      <form id="cycleForm" method="dialog" class="dialog-form">
        <h2>新增绩效周期</h2>
        <label>周期名称<input name="name" required placeholder="例如 2026 下半年绩效" /></label>
        <label>开始日期<input name="start_date" type="date" required /></label>
        <label>结束日期<input name="end_date" type="date" required /></label>
        <label>状态
          <select name="status">
            <option>进行中</option>
            <option>计划中</option>
            <option>已归档</option>
          </select>
        </label>
        <div class="form-actions">
          <button value="cancel" class="ghost-button">取消</button>
          <button value="default" class="primary-button">保存</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
